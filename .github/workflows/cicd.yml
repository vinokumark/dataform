name: CI/CD (Dev only)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5.7"
  REPORTING_DATASETS: '["REPORTING"]'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — detect what changed + build deployment groups
  # ────────────────────────────────────────────────────────────────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.detect.outputs.infra_changed }}
      group_a:       ${{ steps.detect.outputs.group_a }}
      group_b:       ${{ steps.detect.outputs.group_b }}
      group_c:       ${{ steps.detect.outputs.group_c }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}

      - name: Detect changed paths and build groups
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          fi

          echo "=== Changed files ==="
          echo "$CHANGED"

          # infra changed = any .tf/.tfvars outside objects/
          INFRA=$(echo "$CHANGED" \
            | grep -v '^objects/' \
            | grep -E '\.tf$|\.tfvars$' \
            | wc -l)
          [ "$INFRA" -gt "0" ] \
            && echo "infra_changed=true"  >> $GITHUB_OUTPUT \
            || echo "infra_changed=false" >> $GITHUB_OUTPUT

          # folders changed directly in objects/
          FOLDERS_OBJECTS=$(echo "$CHANGED" \
            | grep '^objects/' \
            | cut -d'/' -f2 \
            | sort -u)

          # folders changed in bigQuery/ — case-insensitive match to actual objects/ folder name
          FOLDERS_BIGQUERY=""
          for bq_folder in $(echo "$CHANGED" | grep '^bigQuery/' | cut -d'/' -f2 | sort -u); do
            matched=$(find objects -maxdepth 1 -type d -iname "$bq_folder" -printf '%f\n' 2>/dev/null | head -1)
            [ -n "$matched" ] && FOLDERS_BIGQUERY="$FOLDERS_BIGQUERY $matched"
          done

          # merge both sources, deduplicate
          FOLDERS=$(printf '%s\n' $FOLDERS_OBJECTS $FOLDERS_BIGQUERY | sort -u | grep -v '^$' || true)

          echo "=== Changed object folders ==="
          echo "$FOLDERS"

          GROUP_A=()
          GROUP_B=()
          GROUP_C=()

          for folder in $FOLDERS; do
            if echo '${{ env.REPORTING_DATASETS }}' \
                | jq -e --arg f "$folder" 'contains([$f])' > /dev/null 2>&1; then
              GROUP_C+=("$folder")
            elif [ -f "objects/$folder/.depends_on" ]; then
              GROUP_B+=("$folder")
            else
              GROUP_A+=("$folder")
            fi
          done

          GA=$(printf '%s\n' "${GROUP_A[@]}" | jq -R 'select(length > 0)' | jq -sc . 2>/dev/null || echo "[]")
          GB=$(printf '%s\n' "${GROUP_B[@]}" | jq -R 'select(length > 0)' | jq -sc . 2>/dev/null || echo "[]")
          GC=$(printf '%s\n' "${GROUP_C[@]}" | jq -R 'select(length > 0)' | jq -sc . 2>/dev/null || echo "[]")

          { [ "$GA" == "null" ] || [ -z "$GA" ]; } && GA="[]"
          { [ "$GB" == "null" ] || [ -z "$GB" ]; } && GB="[]"
          { [ "$GC" == "null" ] || [ -z "$GC" ]; } && GC="[]"

          echo "group_a=$GA" >> $GITHUB_OUTPUT
          echo "group_b=$GB" >> $GITHUB_OUTPUT
          echo "group_c=$GC" >> $GITHUB_OUTPUT

          echo "=== Groups ==="
          echo "Group A: $GA"
          echo "Group B: $GB"
          echo "Group C: $GC"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — pre-commit (PR only)
  # ────────────────────────────────────────────────────────────────────────────
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-commit
        run: |
          python3 -m pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure --color always

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — prepare folder list for plan matrix (PR only)
  # ────────────────────────────────────────────────────────────────────────────
  plan-objects-prepare:
    name: Prepare object folders for plan
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'pull_request'
    outputs:
      all_folders: ${{ steps.merge.outputs.all_folders }}
    steps:
      - name: Merge all groups into one list
        id: merge
        run: |
          GA='${{ needs.detect.outputs.group_a }}'
          GB='${{ needs.detect.outputs.group_b }}'
          GC='${{ needs.detect.outputs.group_c }}'

          MERGED=$(echo "[$GA,$GB,$GC]" \
            | jq -c '[flatten[] | select(length > 0)] | unique' 2>/dev/null || echo '[]')

          { [ "$MERGED" == "[]" ] || [ -z "$MERGED" ]; } \
            && MERGED='["_no_change"]'

          echo "all_folders=$MERGED" >> $GITHUB_OUTPUT
          echo "Combined folders: $MERGED"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 — plan infra / dev (PR only)
  # ────────────────────────────────────────────────────────────────────────────
  plan-infra-dev:
    name: Plan infra (dev)
    runs-on: ubuntu-latest
    needs: [detect, pre-commit]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: No infra changes
        if: needs.detect.outputs.infra_changed == 'false'
        run: echo "No infra changes — plan skipped."

      - name: Auth GCP
        if: needs.detect.outputs.infra_changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Setup terraform
        if: needs.detect.outputs.infra_changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (dev)
        if: needs.detect.outputs.infra_changed == 'true'
        run: |
          terraform init \
            -backend-config=environments/dev/dev.tfbackend \
            -reconfigure -input=false -no-color

      - name: Terraform plan (dev)
        if: needs.detect.outputs.infra_changed == 'true'
        run: |
          terraform plan \
            -var-file=environments/dev/dev.tfvars \
            -input=false -no-color 2>&1 | tee plan_output.txt
          exit ${PIPESTATUS[0]}

      - name: Post plan to PR (dev)
        if: needs.detect.outputs.infra_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const body = plan.length > 60000
              ? plan.slice(0, 60000) + '\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Plan — \`infra\` / \`dev\`\n\`\`\`\n${body}\n\`\`\``
            });

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 — plan objects / dev (PR only)
  # ────────────────────────────────────────────────────────────────────────────
  plan-objects-dev:
    name: Plan objects/${{ matrix.folder }} (dev)
    runs-on: ubuntu-latest
    needs: [detect, pre-commit, plan-objects-prepare]
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        folder: ${{ fromJson(needs.plan-objects-prepare.outputs.all_folders) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: No object changes
        if: matrix.folder == '_no_change'
        run: echo "No object changes — plan skipped."

      - name: Auth GCP
        if: matrix.folder != '_no_change'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Setup terraform
        if: matrix.folder != '_no_change'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init — ${{ matrix.folder }} (dev)
        if: matrix.folder != '_no_change'
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform init \
            -backend-config=environments/dev/dev.tfbackend \
            -reconfigure -input=false -no-color

      - name: Plan — ${{ matrix.folder }} (dev)
        if: matrix.folder != '_no_change'
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform plan \
            -var-file=environments/dev/dev.tfvars \
            -input=false -no-color 2>&1 | tee plan_output.txt
          exit ${PIPESTATUS[0]}

      - name: Post plan to PR — ${{ matrix.folder }} (dev)
        if: matrix.folder != '_no_change'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(
              'objects/${{ matrix.folder }}/plan_output.txt', 'utf8'
            );
            const body = plan.length > 60000
              ? plan.slice(0, 60000) + '\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Plan — \`objects/${{ matrix.folder }}\` / \`dev\`\n\`\`\`\n${body}\n\`\`\``
            });

  # ────────────────────────────────────────────────────────────────────────────
  # APPLY DEV — runs on push to main (PR merged)
  # order: infra → group_a → group_b → group_c
  # ────────────────────────────────────────────────────────────────────────────
  apply-infra-dev:
    name: Apply infra — dev
    runs-on: ubuntu-latest
    needs: detect
    if: |
      github.event_name == 'push' &&
      needs.detect.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init
        run: |
          terraform init \
            -backend-config=environments/dev/dev.tfbackend \
            -reconfigure -input=false -no-color
      - name: Apply
        run: |
          terraform apply \
            -var-file=environments/dev/dev.tfvars \
            -auto-approve -input=false -no-color \
            -parallelism=10

  apply-group-a-dev:
    name: Apply Group A/${{ matrix.folder }} — dev
    runs-on: ubuntu-latest
    needs: [detect, apply-infra-dev]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.detect.outputs.group_a != '[]' &&
      (needs.apply-infra-dev.result == 'success' ||
       needs.apply-infra-dev.result == 'skipped')
    strategy:
      matrix:
        folder: ${{ fromJson(needs.detect.outputs.group_a) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init — ${{ matrix.folder }}
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform init \
            -backend-config=environments/dev/dev.tfbackend \
            -reconfigure -input=false -no-color
      - name: Apply — ${{ matrix.folder }}
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform apply \
            -var-file=environments/dev/dev.tfvars \
            -auto-approve -input=false -no-color \
            -parallelism=10

  apply-group-b-dev:
    name: Apply Group B/${{ matrix.folder }} — dev
    runs-on: ubuntu-latest
    needs: [detect, apply-group-a-dev]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.detect.outputs.group_b != '[]' &&
      (needs.apply-group-a-dev.result == 'success' ||
       needs.apply-group-a-dev.result == 'skipped')
    strategy:
      matrix:
        folder: ${{ fromJson(needs.detect.outputs.group_b) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init — ${{ matrix.folder }}
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform init \
            -backend-config=environments/dev/dev.tfbackend \
            -reconfigure -input=false -no-color
      - name: Apply — ${{ matrix.folder }}
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform apply \
            -var-file=environments/dev/dev.tfvars \
            -auto-approve -input=false -no-color \
            -parallelism=10

  apply-group-c-dev:
    name: Apply Group C/${{ matrix.folder }} — dev
    runs-on: ubuntu-latest
    needs: [detect, apply-group-b-dev]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.detect.outputs.group_c != '[]' &&
      (needs.apply-group-b-dev.result == 'success' ||
       needs.apply-group-b-dev.result == 'skipped')
    strategy:
      matrix:
        folder: ${{ fromJson(needs.detect.outputs.group_c) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init — ${{ matrix.folder }}
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform init \
            -backend-config=environments/dev/dev.tfbackend \
            -reconfigure -input=false -no-color
      - name: Apply — ${{ matrix.folder }}
        working-directory: objects/${{ matrix.folder }}
        run: |
          terraform apply \
            -var-file=environments/dev/dev.tfvars \
            -auto-approve -input=false -no-color \
            -parallelism=10
